<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Invoice Builder - Tronex Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/invoice.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .page-wrap{padding:18px}
    .msg{display:none;margin:10px 0 0;padding:10px 12px;border-radius:10px}
    .msg.error{display:block;background:#ffe8e8;color:#8a1f1f;border:1px solid #ffd0d0}
    .msg.success{display:block;background:#e8fff1;color:#0f5a2b;border:1px solid #bff2d2}
    .invoice-preview-shell{
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      padding:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }
    .preview-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:12px 0 14px;
    }
    .btn{border:none;border-radius:10px;padding:11px 12px;font-weight:800;cursor:pointer}
    .btn-secondary{background:#111;color:#fff}
    .btn-ghost{background:transparent;border:1px solid rgba(0,0,0,.14)}
    .btn-danger{background:#b42318;color:#fff}
    .btn-download{background:#667eea;color:#fff}
  </style>
</head>
<body>
  <div class="admin-container">
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <i class="fas fa-car"></i>
        <span>Tronex Admin</span>
      </div>
      <nav class="admin-nav">
        <a href="/admin-dashboard" class="admin-nav-link">
          <i class="fas fa-chart-line"></i> Dashboard
        </a>
        <a href="/manage-cars" class="admin-nav-link">
          <i class="fas fa-list"></i> Manage Cars
        </a>
        <a href="/admin-invoices" class="admin-nav-link active">
          <i class="fas fa-receipt"></i> Invoice Builder
        </a>
        <a href="/" class="admin-nav-link">
          <i class="fas fa-arrow-left"></i> Back to Site
        </a>
      </nav>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <div>
          <h1>Invoice Builder</h1>
          <div class="badge-pill"><i class="fa-solid fa-bolt"></i> Create draft invoices fast</div>
        </div>
        <div class="right-actions">
          <button class="btn btn-secondary" id="btnLogout" type="button">Logout</button>
        </div>
      </div>

      <div class="page-wrap">
        <div id="msg" class="msg"></div>

        <div class="preview-actions">
          <button class="btn btn-download" id="btnDownloadPdf" type="button" disabled>
            <i class="fa-solid fa-file-arrow-down"></i> Download PDF
          </button>
          <button class="btn btn-ghost" id="btnClear" type="button" disabled>
            <i class="fa-solid fa-broom"></i> Clear
          </button>
        </div>

        <div class="invoice-preview-shell">
          <div id="invoicePreview"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/admin-invoices.js?v=20260325"></script>
</body>
</html>
