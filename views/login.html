<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Tronex</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-wrap{max-width:980px;margin:40px auto;padding:0 16px}
    .auth-card{display:grid;grid-template-columns:1fr 1fr;gap:18px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    @media (max-width:900px){.auth-card{grid-template-columns:1fr}}
    .auth-left{padding:26px 24px;background:linear-gradient(135deg,#111 0%,#444 100%);color:#fff}
    .auth-right{padding:26px 24px}
    .auth-title{margin:0 0 8px;font-size:28px}
    .auth-sub{margin:0 0 18px;color:rgba(255,255,255,.9)}
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .fg label{font-weight:600;color:#111}
    .fg input{padding:11px 12px;border:1px solid rgba(0,0,0,.12);border-radius:10px;outline:none}
    .fg input:focus{border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,.18)}
    .btn-primary{width:100%;padding:12px 14px;border:none;border-radius:10px;background:#667eea;color:#fff;font-weight:800;cursor:pointer}
    .btn-primary:disabled{opacity:.7;cursor:not-allowed}
    .msg{margin:10px 0 0;padding:10px 12px;border-radius:10px;display:none}
    .msg.error{display:block;background:#ffe8e8;color:#8a1f1f;border:1px solid #ffd0d0}
    .msg.success{display:block;background:#e8fff1;color:#0f5a2b;border:1px solid #bff2d2}
    .hint{margin-top:10px;color:rgba(0,0,0,.7)}
    .hint a{color:#667eea;font-weight:700;text-decoration:none}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);margin-top:10px}
    .pill i{opacity:.95}
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-left">
        <h1 class="auth-title">Login</h1>
        <p class="auth-sub">Use your account to access invoices and your profile.</p>
        <div class="pill"><i class="fa-solid fa-receipt"></i> Invoice access</div>
        <div class="pill"><i class="fa-solid fa-user-check"></i> Profile & security</div>
      </div>

      <div class="auth-right">
        <p class="hint">Don’t have an account? <a href="/register">Register</a></p>
        <div id="msg" class="msg"></div>
        <form id="loginForm">
          <div class="fg">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email">
          </div>
          <div class="fg">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">
          </div>
          <button id="btnLogin" class="btn-primary" type="submit">Login</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>window.__AUTH_PAGE__ = 'login';</script>
</body>
</html>
